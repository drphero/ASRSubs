name: build-windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install ffmpeg
        shell: pwsh
        run: choco install ffmpeg --version=7.1.1 -y

      - name: Build Windows executable and NSIS scaffolding
        shell: pwsh
        run: wails build -clean -platform windows/amd64 -nsis -webview2 embed

      - name: Assemble portable runtime layout
        shell: pwsh
        run: |
          $portableRoot = "build/bin/ASRSubs-windows-portable"
          New-Item -ItemType Directory -Force -Path $portableRoot | Out-Null
          Copy-Item "build/bin/ASRSubs.exe" "$portableRoot/ASRSubs.exe" -Force

      - name: Stage runtime assets
        shell: bash
        env:
          ASRSUBS_PYTHON_STANDALONE: ${{ env.pythonLocation }}
          ASRSUBS_FFMPEG_PATH: /c/ProgramData/chocolatey/bin/ffmpeg.exe
          ASRSUBS_FFPROBE_PATH: /c/ProgramData/chocolatey/bin/ffprobe.exe
        run: ./scripts/stage-runtime.sh windows/amd64 build/bin/ASRSubs-windows-portable/ASRSubs.exe

      - name: Verify staged layout
        shell: bash
        run: ./scripts/verify-windows-package-layout.sh

      - name: Build portable archive
        shell: pwsh
        run: |
          if (Test-Path "build/bin/ASRSubs-windows-portable.zip") {
            Remove-Item "build/bin/ASRSubs-windows-portable.zip" -Force
          }
          Compress-Archive -Path "build/bin/ASRSubs-windows-portable/*" -DestinationPath "build/bin/ASRSubs-windows-portable.zip"

      - name: Build NSIS installer
        shell: pwsh
        run: |
          makensis `
            -DARG_WAILS_AMD64_BINARY=..\..\bin\ASRSubs.exe `
            -DASRSUBS_STAGE_DIR=..\..\bin\ASRSubs-windows-portable `
            build/windows/installer/project.nsi

      - name: Verify workflow contract
        shell: bash
        run: ./scripts/verify-windows-workflow.sh

      - uses: actions/upload-artifact@v6
        with:
          name: ASRSubs-windows-portable
          path: build/bin/ASRSubs-windows-portable.zip
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        with:
          name: ASRSubs-windows-installer
          path: build/bin/ASRSubs-amd64-installer.exe
          if-no-files-found: error
