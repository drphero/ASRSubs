name: build-windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"

      - name: Resolve app version
        shell: pwsh
        run: |
          $version = (Get-Content "wails.json" | ConvertFrom-Json).info.productVersion
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "wails.json info.productVersion is required"
          }
          "ASRSUBS_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASRSUBS_PORTABLE_ZIP=ASRSubs-$version-windows-amd64-portable.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASRSUBS_INSTALLER_EXE=ASRSubs-$version-windows-amd64-installer.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install ffmpeg
        shell: pwsh
        run: choco install ffmpeg --version=7.1.1 -y

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Build Windows executable and NSIS scaffolding
        shell: pwsh
        run: wails build -clean -platform windows/amd64 -nsis -webview2 embed

      - name: Assemble portable runtime layout
        shell: pwsh
        run: |
          $portableRoot = "build/bin/ASRSubs-windows-portable"
          New-Item -ItemType Directory -Force -Path $portableRoot | Out-Null
          Copy-Item "build/bin/ASRSubs.exe" "$portableRoot/ASRSubs.exe" -Force

      - name: Stage runtime assets
        shell: bash
        env:
          ASRSUBS_PYTHON_STANDALONE: ${{ env.pythonLocation }}
          ASRSUBS_FFMPEG_PATH: /c/ProgramData/chocolatey/lib/ffmpeg/tools/ffmpeg/bin/ffmpeg.exe
          ASRSUBS_FFPROBE_PATH: /c/ProgramData/chocolatey/lib/ffmpeg/tools/ffmpeg/bin/ffprobe.exe
        run: ./scripts/stage-runtime.sh windows/amd64 build/bin/ASRSubs-windows-portable/ASRSubs.exe

      - name: Verify staged layout
        shell: bash
        run: ./scripts/verify-windows-package-layout.sh

      - name: Smoke-test staged ffmpeg tools
        shell: pwsh
        run: |
          $pythonw = (Resolve-Path "build/bin/ASRSubs-windows-portable/runtime/python/pythonw.exe").Path
          $ffmpeg = (Resolve-Path "build/bin/ASRSubs-windows-portable/bin/ffmpeg.exe").Path
          $ffprobe = (Resolve-Path "build/bin/ASRSubs-windows-portable/bin/ffprobe.exe").Path

          if (-not (Test-Path $pythonw)) {
            throw "staged pythonw.exe is missing"
          }

          & $ffmpeg -version
          if ($LASTEXITCODE -ne 0) {
            throw "staged ffmpeg.exe failed to execute"
          }

          & $ffprobe -version
          if ($LASTEXITCODE -ne 0) {
            throw "staged ffprobe.exe failed to execute"
          }

      - name: Build portable archive
        shell: pwsh
        run: |
          $portableZip = "build/bin/$env:ASRSUBS_PORTABLE_ZIP"
          if (Test-Path $portableZip) {
            Remove-Item $portableZip -Force
          }
          Compress-Archive -Path "build/bin/ASRSubs-windows-portable/*" -DestinationPath $portableZip

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $makensis = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          if (-not $makensis) {
            $candidates = @(
              "$env:ProgramData\chocolatey\bin\makensis.exe",
              "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
              "$env:ProgramFiles\NSIS\makensis.exe"
            )
            $makensis = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $makensis) {
            throw "makensis executable not found after NSIS install"
          }

          $repoRoot = $PWD.Path
          $amd64Binary = (Resolve-Path "build/bin/ASRSubs.exe").Path
          $stageDir = (Resolve-Path "build/bin/ASRSubs-windows-portable").Path

          Push-Location "build/windows/installer"
          try {
            & $makensis `
              "/DARG_WAILS_AMD64_BINARY=$amd64Binary" `
              "/DASRSUBS_STAGE_DIR=$stageDir" `
              "project.nsi"
          }
          finally {
            Pop-Location
          }

          Move-Item "build/bin/ASRSubs-amd64-installer.exe" "build/bin/$env:ASRSUBS_INSTALLER_EXE" -Force

      - name: Verify workflow contract
        shell: bash
        run: ./scripts/verify-windows-workflow.sh

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ASRSUBS_PORTABLE_ZIP }}
          path: build/bin/${{ env.ASRSUBS_PORTABLE_ZIP }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ASRSUBS_INSTALLER_EXE }}
          path: build/bin/${{ env.ASRSUBS_INSTALLER_EXE }}
          if-no-files-found: error
